# config.yaml - Control Panel: Change pipeline behavior here
pipeline:
  chunking: "recursive"       # Options: recursive, semantic, parent_child, paragraph
  embeddings: "huggingface"   # Options: openai, huggingface
  vector_store: "chroma"      # Options: chroma, faiss, pinecone
  retrieval: "semantic"       # Options: semantic, bm25, hybrid
  llm: "openai"               # Options: openai, gemini, groq, claude

params:
  chunk_size: 1000
  chunk_overlap: 100
  top_k: 5
